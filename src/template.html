<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
</head>
<body>
    <h1>Weather todayy :D</h1>
    <div class="container">
        <form action="">
            <label for="location-input">Enter a city</label>
            <input type="text" id="location-input">
            <button type="submit">Search</button>
        </form>
        <p id="loading" style="display: none">Loading... ⌛️</p>
        <div class="weather-result"></div>
        <button id="toggle-unit">Toggle unit (°F <-> °C)</button>
    </div>
</body>
</html>
